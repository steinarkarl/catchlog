<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Catch Log</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:         rgba(10, 22, 15, 0.88);
            --surface:    rgba(18, 38, 26, 0.90);
            --surface2:   rgba(26, 52, 36, 0.92);
            --accent:     #4ade80;
            --text:       #f0fdf4;
            --text-muted: #86efac;
            --border:     rgba(55, 100, 72, 0.7);
            --input-bg:   rgba(12, 30, 20, 0.85);
        }

        /* ── River background ── */
        body {
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 480px;
            margin: 0 auto;
            position: relative;
        }

        #river-bg {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            object-fit: cover;
        }

        /* ── Header ── */
        .header {
            padding: 18px 20px 14px;
            background: var(--surface);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-trout { width: 48px; height: 28px; flex-shrink: 0; }
        .header-text h1 { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: -0.4px; }
        .header-text p  { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

        /* ── Content ── */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            padding-bottom: 90px;
        }

        /* ── Bottom nav ── */
        .nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-top: 1px solid var(--border);
            display: flex;
            padding: 8px 0 env(safe-area-inset-bottom, 0px);
        }
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            transition: color 0.15s;
        }
        .nav-btn.active { color: var(--accent); }
        .nav-btn svg { width: 24px; height: 24px; }

        /* ── Views ── */
        .view { display: none; }
        .view.active { display: block; }

        /* ── Form ── */
        .form-group { margin-bottom: 16px; }
        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.7px;
            margin-bottom: 7px;
        }

        /* Gender toggle */
        .gender-toggle { display: flex; gap: 10px; }
        .gender-btn {
            flex: 1;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 14px;
            background: var(--input-bg);
            backdrop-filter: blur(8px);
            color: var(--text);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }
        .gender-btn.selected {
            border-color: var(--accent);
            background: rgba(74, 222, 128, 0.18);
            color: var(--accent);
        }

        /* Inputs */
        input[type="number"],
        input[type="text"] {
            width: 100%;
            padding: 15px 16px;
            background: var(--input-bg);
            backdrop-filter: blur(8px);
            border: 2px solid var(--border);
            border-radius: 14px;
            color: var(--text);
            font-size: 17px;
            outline: none;
            transition: border-color 0.15s;
            -webkit-appearance: none;
        }
        input[type="number"]:focus,
        input[type="text"]:focus { border-color: var(--accent); }
        input::placeholder { color: rgba(134,239,172,0.35); }

        /* Autocomplete */
        .autocomplete-wrapper { position: relative; }
        .autocomplete-list {
            position: absolute;
            top: calc(100% + 4px);
            left: 0; right: 0;
            background: rgba(26, 52, 36, 0.97);
            backdrop-filter: blur(16px);
            border: 2px solid var(--accent);
            border-radius: 14px;
            overflow: hidden;
            z-index: 100;
            max-height: 210px;
            overflow-y: auto;
        }
        .autocomplete-item {
            padding: 14px 16px;
            cursor: pointer;
            font-size: 16px;
            border-bottom: 1px solid var(--border);
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:active { background: rgba(74,222,128,0.15); }
        .autocomplete-item.add-new { color: var(--accent); font-weight: 600; }

        /* Primary button */
        .btn-primary {
            width: 100%;
            padding: 17px;
            background: var(--accent);
            color: #0a1a0f;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 6px;
            transition: transform 0.1s, opacity 0.1s;
        }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

        /* Secondary button */
        .btn-secondary {
            width: 100%;
            padding: 13px;
            background: rgba(10, 26, 16, 0.7);
            backdrop-filter: blur(8px);
            color: var(--accent);
            border: 2px solid var(--accent);
            border-radius: 14px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 14px;
        }

        /* Stats */
        .stats-row { display: flex; gap: 8px; margin-bottom: 16px; }
        .stat-card {
            flex: 1;
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
        }
        .stat-num { font-size: 22px; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.4px; }

        /* Catch cards */
        .catch-card {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 9px;
        }
        .catch-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 9px;
        }
        .catch-spot { font-size: 15px; font-weight: 700; }
        .catch-date { font-size: 11px; color: var(--text-muted); text-align: right; line-height: 1.4; }
        .catch-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .catch-delete {
            margin-left: auto;
            background: none;
            border: 1px solid rgba(248, 113, 113, 0.4);
            border-radius: 6px;
            color: #f87171;
            font-size: 13px;
            padding: 3px 9px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            flex-shrink: 0;
        }
        .catch-delete:active { background: rgba(248,113,113,0.15); border-color: #f87171; }
        .catch-tag {
            background: rgba(26, 52, 36, 0.9);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 3px 9px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .catch-tag.gender { color: var(--accent); border-color: rgba(74,222,128,0.4); }

        /* Empty state */
        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); }
        .empty-state p { font-size: 15px; line-height: 1.6; }

        /* Manage page */
        .manage-section { margin-bottom: 26px; }
        .manage-section h3 {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.7px;
            margin-bottom: 10px;
        }
        .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; min-height: 10px; }
        .tag-chip {
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--surface2);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 6px 8px 6px 13px;
            font-size: 13px;
        }
        .tag-chip button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            line-height: 1;
            padding: 0 2px;
            display: flex;
            align-items: center;
        }
        .add-item-row { display: flex; gap: 8px; }
        .add-item-row input { flex: 1; font-size: 15px; padding: 12px 14px; }
        .btn-add {
            padding: 12px 18px;
            background: var(--accent);
            color: #0a1a0f;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: var(--accent);
            color: #0a1a0f;
            padding: 11px 22px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 15px;
            transition: transform 0.3s ease;
            z-index: 999;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* Modal overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(6px);
            z-index: 500;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: rgba(18, 38, 26, 0.97);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 22px 20px 20px;
            width: 100%;
            max-width: 440px;
            max-height: 88vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-title { font-size: 17px; font-weight: 700; color: var(--accent); }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 22px;
            cursor: pointer;
            line-height: 1;
            padding: 2px 6px;
        }
        .modal-actions { display: flex; gap: 10px; margin-top: 6px; }
        .modal-actions .btn-primary { margin-top: 0; }
        .btn-cancel {
            flex: 1;
            padding: 17px;
            background: transparent;
            color: var(--text-muted);
            border: 2px solid var(--border);
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Edit button on catch card */
        .catch-edit {
            background: none;
            border: 1px solid rgba(74, 222, 128, 0.35);
            border-radius: 6px;
            color: var(--accent);
            font-size: 13px;
            padding: 3px 9px;
            cursor: pointer;
            transition: background 0.15s;
            flex-shrink: 0;
        }
        .catch-edit:active { background: rgba(74,222,128,0.12); }

        /* Fisherman name banner */
        .fisherman-banner {
            background: rgba(74, 222, 128, 0.08);
            border: 1px solid rgba(74, 222, 128, 0.2);
            border-radius: 14px;
            padding: 12px 16px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .fisherman-banner span { font-size: 20px; }
        .fisherman-banner p { font-size: 14px; color: var(--text-muted); line-height: 1.3; }
        .fisherman-banner p strong { color: var(--text); font-size: 15px; }
        .name-presets { display: flex; gap: 8px; margin-top: 8px; }
        .name-preset {
            flex: 1;
            padding: 11px 6px;
            background: var(--input-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.15s;
        }
        .name-preset.active {
            border-color: var(--accent);
            background: rgba(74,222,128,0.12);
            color: var(--accent);
        }

        /* ── Area landing page ── */
        #area-landing {
            display: none;
            flex-direction: column;
            min-height: 100vh;
            padding: 0 20px 40px;
        }
        #area-landing.active { display: flex; }

        .landing-header {
            padding: 48px 0 8px;
            text-align: center;
        }
        .landing-logo {
            width: 64px; height: 38px;
            margin: 0 auto 16px;
            display: block;
            border-radius: 8px;
            object-fit: cover;
        }
        .landing-header h1 {
            font-size: 26px;
            font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
        }
        .landing-header p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .area-cards {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 32px;
            flex: 1;
        }
        .area-card {
            background: var(--surface);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 22px 20px;
            cursor: pointer;
            transition: border-color 0.18s, background 0.18s, transform 0.12s;
            text-align: left;
            width: 100%;
        }
        .area-card:active { transform: scale(0.98); }
        #card-veidiv\u00f6tn {
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
        }
        #card-veidiv\u00f6tn .area-card-name { text-shadow: 0 1px 6px rgba(0,0,0,0.8); }
        #card-veidiv\u00f6tn .area-card-sub  { text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
        .area-card:hover {
            border-color: var(--accent);
            background: rgba(74,222,128,0.08);
        }
        .area-card-name {
            font-size: 19px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .area-card-name span { font-size: 22px; }
        .area-card-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            padding-left: 32px;
        }
        .area-card.new-area {
            border-style: dashed;
            border-color: var(--text-muted);
        }
        .area-card.new-area:hover { border-color: var(--accent); }
        .area-card.new-area .area-card-name { color: var(--text-muted); }

        /* ── Custom area input panel ── */
        #custom-area-panel {
            display: none;
            flex-direction: column;
            gap: 12px;
            margin-top: 32px;
            flex: 1;
        }
        #custom-area-panel.active { display: flex; }
        #custom-area-panel label {
            font-size: 14px;
            color: var(--text-muted);
        }
        #custom-area-input {
            background: var(--surface);
            border: 2px solid var(--accent);
            border-radius: 14px;
            padding: 16px 18px;
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            width: 100%;
            outline: none;
        }
        #custom-area-input::placeholder { color: var(--text-muted); font-weight: 400; }
        #custom-area-back {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 13px;
            cursor: pointer;
            text-align: left;
            padding: 0;
            margin-top: 4px;
        }
        /* ── Change-area button in header ── */
        .header-area-btn {
            margin-left: auto;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            background: none;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 12px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .header-area-btn:active { background: rgba(74,222,128,0.08); }

        /* ── App container (hidden until area chosen) ── */
        #app-container { display: none; flex-direction: column; min-height: 100vh; }
        #app-container.active { display: flex; }
    </style>
</head>
<body>

<!-- ═══════════════ AREA LANDING PAGE ═══════════════ -->
<div id="area-landing">
    <div class="landing-header">
        <svg class="landing-logo" viewBox="0 0 64 38" xmlns="http://www.w3.org/2000/svg">
            <rect width="64" height="38" rx="8" fill="rgba(18,38,26,0.9)"/>
            <ellipse cx="32" cy="19" rx="18" ry="7" fill="none" stroke="#4ade80" stroke-width="2" opacity="0.6"/>
            <path d="M14 19 Q20 12 32 19 Q44 26 50 19" fill="none" stroke="#4ade80" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="44" cy="18" r="2" fill="#4ade80" opacity="0.8"/>
        </svg>
        <h1>Catch Log</h1>
        <p>Veldu veiðisvæði / Select fishing area</p>
    </div>

    <div class="area-cards" id="area-cards">
        <button class="area-card" id="card-veidivötn" onclick="selectArea('Veiðivötn')">
            <div class="area-card-name">
                <span>🏔️</span> Veiðivötn
            </div>
            <div class="area-card-sub">Highland lakes, South Iceland</div>
        </button>

        <button class="area-card" id="card-laxa" onclick="selectArea('Laxá í Mývatnssveit')">
            <div class="area-card-name">
                <span>🌿</span> Laxá í Mývatnssveit
            </div>
            <div class="area-card-sub">Lake Mývatn district, North Iceland</div>
        </button>

        <button class="area-card" id="card-elliðaár" onclick="selectArea('Elliðaár')">
            <div class="area-card-name">
                <span>🐟</span> Elliðaár
            </div>
            <div class="area-card-sub">Reykjavík city river</div>
        </button>

        <button class="area-card new-area" onclick="showCustomAreaInput()">
            <div class="area-card-name">
                <span>➕</span> New area / Nýtt svæði
            </div>
        </button>
    </div>

    <!-- Custom area input -->
    <div id="custom-area-panel">
        <label>Type the fishing area name:</label>
        <input id="custom-area-input" type="text" placeholder="e.g. Þverá, Norðurá…"
               oninput="updateCustomAreaBtn()"
               onkeydown="if(event.key==='Enter') confirmCustomArea()">
        <button class="btn-primary" id="custom-area-confirm" onclick="confirmCustomArea()" disabled
                style="margin-top:4px">Go fishing →</button>
        <button id="custom-area-back" onclick="hideCustomAreaInput()">← Back</button>
    </div>
</div>

<!-- ═══════════════ APP CONTAINER ═══════════════ -->
<div id="app-container">

<svg id="river-bg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="gSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7aacc8"/>
      <stop offset="60%"  stop-color="#b8d8ec"/>
      <stop offset="100%" stop-color="#c8e0ee"/>
    </linearGradient>
    <linearGradient id="gMtn1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a5e70"/>
      <stop offset="100%" stop-color="#2e3f50"/>
    </linearGradient>
    <linearGradient id="gMtn2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a42"/>
      <stop offset="100%" stop-color="#1a2830"/>
    </linearGradient>
    <linearGradient id="gWater" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1c6e88"/>
      <stop offset="40%"  stop-color="#165e78"/>
      <stop offset="100%" stop-color="#0d4055"/>
    </linearGradient>
    <linearGradient id="gBankL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2a5220"/>
      <stop offset="100%" stop-color="#3d7030"/>
    </linearGradient>
    <linearGradient id="gBankR" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%"   stop-color="#2a5220"/>
      <stop offset="100%" stop-color="#3d7030"/>
    </linearGradient>
    <linearGradient id="gHill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3d6e2a"/>
      <stop offset="100%" stop-color="#2a5018"/>
    </linearGradient>
    <radialGradient id="gSun" cx="72%" cy="18%" r="20%">
      <stop offset="0%"  stop-color="#fffbe0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fffbe0" stop-opacity="0"/>
    </radialGradient>
    <!-- Water shimmer filter -->
    <filter id="shimmer">
      <feTurbulence type="turbulence" baseFrequency="0.015 0.08" numOctaves="3" result="noise" seed="2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="480" height="420" fill="url(#gSky)"/>
  <!-- Sun glow -->
  <rect width="480" height="420" fill="url(#gSun)"/>

  <!-- Clouds -->
  <g opacity="0.55" fill="white">
    <ellipse cx="85"  cy="75"  rx="62" ry="22"/>
    <ellipse cx="115" cy="68"  rx="48" ry="18"/>
    <ellipse cx="60"  cy="82"  rx="38" ry="14"/>
    <ellipse cx="355" cy="92"  rx="58" ry="20"/>
    <ellipse cx="385" cy="86"  rx="44" ry="17"/>
    <ellipse cx="335" cy="98"  rx="30" ry="12"/>
    <ellipse cx="220" cy="50"  rx="40" ry="14" opacity="0.4"/>

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── State ───────────────────────────────────────────────────────────────────
const DEFAULT_FLIES = [
    'Elk Hair Caddis', 'Woolly Bugger', 'Adams Dry', 'Hare\'s Ear Nymph',
    'Pheasant Tail', 'Gold Ribbed Hare\'s Ear', 'Blue Winged Olive'
];
const DEFAULT_SPOTS = ['Upper Pool', 'Long Run', 'Mill Bridge'];

let state = { catches: [], flies: [...DEFAULT_FLIES], spots: [...DEFAULT_SPOTS], fisherman: '', area: '' };
let selectedGender = null;

// ─── Persistence ─────────────────────────────────────────────────────────────
function save() {
    // catches live in Supabase; only save local prefs
    const prefs = { flies: state.flies, spots: state.spots, fisherman: state.fisherman, area: state.area };
    localStorage.setItem('catchlog_prefs', JSON.stringify(prefs));
}
function load() {
    try {
        const raw = localStorage.getItem('catchlog_prefs');
        if (raw) {
            const prefs = JSON.parse(raw);
            if (prefs.flies)      state.flies      = prefs.flies;
            if (prefs.spots)      state.spots      = prefs.spots;
            if (prefs.fisherman)  state.fisherman  = prefs.fisherman;
            if (prefs.area)       state.area       = prefs.area;
        }
    } catch(e) {}
}

// ─── Load catches from Supabase ───────────────────────────────────────────────
async function loadCatches() {
    showListLoading(true);
    const { data, error } = await db
        .from('catches')
        .select('*')
        .eq('area', state.area)
        .order('created_at', { ascending: false });
    showListLoading(false);
    if (error) { showToast('Could not load catches ✗'); return; }
    state.catches = data || [];
    renderCatches();
}

function showListLoading(on) {
    const el = document.getElementById('catches-loading');
    if (el) el.style.display = on ? 'block' : 'none';
}

// ─── Real-time: auto-refresh when friends log catches ─────────────────────────
function subscribeRealtime() {
    db.channel('catches-changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'catches' }, () => {
            loadCatches();
        })
        .subscribe();
}

const AREA_CARD_IDS = {
    'Veiðivötn':           'veidivötn',
    'Laxá í Mývatnssveit': 'laxa',
    'Elliðaár':            'elliðaár'
};

function selectArea(area) {
    state.area = area;
    save();
    // Update header
    document.getElementById('header-area-name').textContent = area;
    // Swap app background image if area has a custom one
    const bgEl = document.getElementById('river-bg');
    if (bgEl) {
        if (!bgEl.dataset.default) bgEl.dataset.default = bgEl.src;
        bgEl.src = AREA_BG[area] || bgEl.dataset.default;
    }
    // Swap views
    document.getElementById('area-landing').classList.remove('active');
    document.getElementById('app-container').classList.add('active');
    // Load catches for this area
    loadCatches();
    // Reset to log tab
    showView('log');
}

function showAreaSelector() {
    document.getElementById('app-container').classList.remove('active');
    document.getElementById('area-landing').classList.add('active');
    hideCustomAreaInput();
}

function showCustomAreaInput() {
    document.getElementById('area-cards').style.display = 'none';
    document.getElementById('custom-area-panel').classList.add('active');
    document.getElementById('custom-area-input').value = '';
    document.getElementById('custom-area-confirm').disabled = true;
    setTimeout(() => document.getElementById('custom-area-input').focus(), 50);
}

function hideCustomAreaInput() {
    document.getElementById('custom-area-panel').classList.remove('active');
    document.getElementById('area-cards').style.display = '';
}

function updateCustomAreaBtn() {
    const val = document.getElementById('custom-area-input').value.trim();
    document.getElementById('custom-area-confirm').disabled = val.length === 0;
}

function confirmCustomArea() {
    const val = document.getElementById('custom-area-input').value.trim();
    if (!val) return;
    selectArea(val);
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function showView(name) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + name).classList.add('active');
    document.getElementById('nav-' + name).classList.add('active');
    if (name === 'catches') loadCatches();
    if (name === 'manage')  renderManage();
}

// ─── Gender ───────────────────────────────────────────────────────────────────
function selectGender(g) {
    selectedGender = g;
    document.querySelectorAll('.gender-btn').forEach(b =>
        b.classList.toggle('selected', b.dataset.gender === g));
}

// ─── Fly autocomplete ─────────────────────────────────────────────────────────
function onFlyInput() {
    const val   = document.getElementById('fly-input').value.trim();
    const lower = val.toLowerCase();
    const list  = document.getElementById('fly-list');
    if (!val) { list.style.display = 'none'; return; }
    const matches  = state.flies.filter(f => f.toLowerCase().includes(lower));
    const exactHit = state.flies.some(f => f.toLowerCase() === lower);
    list.innerHTML = '';
    matches.forEach(f => {
        const el = document.createElement('div');
        el.className = 'autocomplete-item';
        el.textContent = f;
        el.onmousedown = e => { e.preventDefault(); pickFly(f); };
        list.appendChild(el);
    });
    if (!exactHit && val) {
        const el = document.createElement('div');
        el.className = 'autocomplete-item add-new';
        el.textContent = `+ Save "${val}" to fly list`;
        el.onmousedown = e => {
            e.preventDefault();
            const name = document.getElementById('fly-input').value.trim();
            if (name && !state.flies.includes(name)) { state.flies.push(name); save(); }
            pickFly(name);
        };
        list.appendChild(el);
    }
    list.style.display = (matches.length || (!exactHit && val)) ? 'block' : 'none';
}
function pickFly(name) {
    document.getElementById('fly-input').value = name;
    document.getElementById('fly-list').style.display = 'none';
}
function hideFlyList() {
    setTimeout(() => { document.getElementById('fly-list').style.display = 'none'; }, 160);
}

// ─── Spot autocomplete ────────────────────────────────────────────────────────
function onSpotInput() {
    const val   = document.getElementById('spot-input').value.trim();
    const lower = val.toLowerCase();
    const list  = document.getElementById('spot-list');
    if (!val) { list.style.display = 'none'; return; }
    const matches  = state.spots.filter(s => s.toLowerCase().includes(lower));
    const exactHit = state.spots.some(s => s.toLowerCase() === lower);
    list.innerHTML = '';
    matches.forEach(s => {
        const el = document.createElement('div');
        el.className = 'autocomplete-item';
        el.textContent = s;
        el.onmousedown = e => { e.preventDefault(); pickSpot(s); };
        list.appendChild(el);
    });
    if (!exactHit && val) {
        const el = document.createElement('div');
        el.className = 'autocomplete-item add-new';
        el.textContent = `+ Save "${val}" to spots list`;
        el.onmousedown = e => {
            e.preventDefault();
            const name = document.getElementById('spot-input').value.trim();
            if (name && !state.spots.includes(name)) { state.spots.push(name); save(); }
            pickSpot(name);
        };
        list.appendChild(el);
    }
    list.style.display = (matches.length || (!exactHit && val)) ? 'block' : 'none';
}
function pickSpot(name) {
    document.getElementById('spot-input').value = name;
    document.getElementById('spot-list').style.display = 'none';
}
function hideSpotList() {
    setTimeout(() => { document.getElementById('spot-list').style.display = 'none'; }, 160);
}

// ─── Log catch ────────────────────────────────────────────────────────────────
async function logCatch() {
    const gender = selectedGender;
    const length = parseFloat(document.getElementById('length-input').value);
    const fly    = document.getElementById('fly-input').value.trim();
    const spot   = document.getElementById('spot-input').value.trim();
    if (!gender)                { showToast('Please select a gender'); return; }
    if (!length || length <= 0) { showToast('Please enter a length'); return; }
    if (!fly)                   { showToast('Please enter a fly'); return; }
    if (!spot)                  { showToast('Please enter a spot'); return; }

    const btn = document.querySelector('#view-log .btn-primary');
    btn.textContent = 'Saving…'; btn.disabled = true;

    const { data, error } = await db.from('catches').insert([{
        timestamp:  new Date().toISOString(),
        fisherman:  state.fisherman || 'Unknown',
        area:       state.area,
        gender, length, fly, spot
    }]).select();

    btn.textContent = '+ Log Catch'; btn.disabled = false;

    if (error) { showToast('Error saving catch ✗'); return; }

    state.catches.unshift(data[0]);
    selectedGender = null;
    document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('length-input').value  = '';
    document.getElementById('fly-input').value     = '';
    document.getElementById('spot-input').value    = '';
    showToast('Catch logged! 🎣');
}

// ─── Render catches ───────────────────────────────────────────────────────────
function renderCatches() {
    const list  = document.getElementById('catches-list');
    const stats = document.getElementById('stats-row');
    const total = state.catches.length;
    const avgLen     = total ? (state.catches.reduce((s, c) => s + c.length, 0) / total).toFixed(1) : '—';
    const longestLen = total ? Math.max(...state.catches.map(c => c.length)) : '—';
    stats.innerHTML = `
        <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total</div></div>
        <div class="stat-card"><div class="stat-num">${total ? avgLen + ' cm' : '—'}</div><div class="stat-label">Avg Length</div></div>
        <div class="stat-card"><div class="stat-num">${total ? longestLen + ' cm' : '—'}</div><div class="stat-label">Longest</div></div>`;
    if (!total) {
        list.innerHTML = `<div class="empty-state">
            <p style="font-size:40px;margin-bottom:14px">🪰</p>
            <p>No catches yet.<br>Head to the river and log your first one!</p>
        </div>`;
        return;
    }
    list.innerHTML = state.catches.map(c => {
        const d       = new Date(c.timestamp);
        const dateStr = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        const timeStr = d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        const gIcon   = c.gender === 'Male' ? '♂' : '♀';
        return `<div class="catch-card">
            <div class="catch-card-header">
                <div class="catch-spot">${esc(c.spot)}</div>
                <div class="catch-date">${dateStr}<br>${timeStr}</div>
            </div>
            <div class="catch-tags">
                <span class="catch-tag gender">${gIcon} ${c.gender}</span>
                <span class="catch-tag">📏 ${c.length} cm</span>
                <span class="catch-tag">🪰 ${esc(c.fly)}</span>
                ${c.fisherman ? `<span class="catch-tag" style="color:var(--text-muted)">👤 ${esc(c.fisherman)}</span>` : ''}
                <button class="catch-edit"   onclick="openEdit(${c.id})">✎ Edit</button>
                <button class="catch-delete" onclick="deleteCatch(${c.id})">✕ Delete</button>
            </div>
        </div>`;
    }).join('');
}

// ─── Delete catch ─────────────────────────────────────────────────────────────
async function deleteCatch(id) {
    const { error } = await db.from('catches').delete().eq('id', id);
    if (error) { showToast('Error deleting catch ✗'); return; }
    state.catches = state.catches.filter(c => c.id !== id);
    renderCatches();
}

// ─── Export CSV ───────────────────────────────────────────────────────────────
function exportCSV() {
    if (!state.catches.length) { showToast('No catches to export'); return; }
    const rows = [['Date', 'Time', 'Spot', 'Gender', 'Length (cm)', 'Fly']];
    state.catches.forEach(c => {
        const d = new Date(c.timestamp);
        rows.push([
            d.toLocaleDateString('en-GB'),
            d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }),
            c.spot, c.gender, c.length, c.fly
        ]);
    });
    const csv  = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = `catches_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
}

// ─── Manage ───────────────────────────────────────────────────────────────────
function renderManage() {
    document.getElementById('spots-tag-list').innerHTML = state.spots.map(s =>
        `<div class="tag-chip">${esc(s)}<button onclick="removeItem('spots','${esc(s)}')">×</button></div>`
    ).join('') || '<span style="color:var(--text-muted);font-size:13px">No spots added yet</span>';
    document.getElementById('flies-tag-list').innerHTML = state.flies.map(f =>
        `<div class="tag-chip">${esc(f)}<button onclick="removeItem('flies','${esc(f)}')">×</button></div>`
    ).join('') || '<span style="color:var(--text-muted);font-size:13px">No flies added yet</span>';
}
function addSpot() {
    const input = document.getElementById('new-spot-input');
    const name  = input.value.trim();
    if (!name || state.spots.includes(name)) { if (!name) return; showToast('Already saved'); return; }
    state.spots.push(name); save(); input.value = ''; renderManage();
}
function addFly() {
    const input = document.getElementById('new-fly-input');
    const name  = input.value.trim();
    if (!name || state.flies.includes(name)) { if (!name) return; showToast('Already saved'); return; }
    state.flies.push(name); save(); input.value = ''; renderManage();
}
function removeItem(key, name) {
    state[key] = state[key].filter(x => x !== name);
    save(); renderManage();
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}


// ─── Fisherman name ───────────────────────────────────────────────────────────
function saveFisherman() {
    const name = document.getElementById('fisherman-input').value.trim();
    state.fisherman = name;
    save();
    updateFishermanBanner();
    updateNamePresets(name);
}

function pickName(name) {
    document.getElementById('fisherman-input').value = name;
    state.fisherman = name;
    save();
    updateFishermanBanner();
    updateNamePresets(name);
}

function updateNamePresets(name) {
    document.querySelectorAll('.name-preset').forEach(b => {
        b.classList.toggle('active', b.textContent === name);
    });
}
function updateFishermanBanner() {
    const name = state.fisherman;
    const banner = document.getElementById('fisherman-banner');
    if (name) {
        document.getElementById('fisherman-banner-name').textContent = name;
        banner.style.display = 'flex';
    } else {
        banner.style.display = 'none';
    }
}

// ─── Edit catch ───────────────────────────────────────────────────────────────
let editingId = null;
let editGender = null;

function openEdit(id) {
    const c = state.catches.find(x => x.id === id);
    if (!c) return;
    editingId = id;
    editGender = c.gender;

    // pre-fill fields
    document.getElementById('edit-length').value = c.length;
    document.getElementById('edit-fly').value    = c.fly;
    document.getElementById('edit-spot').value   = c.spot;

    // gender buttons
    document.querySelectorAll('[data-egender]').forEach(b =>
        b.classList.toggle('selected', b.dataset.egender === c.gender));

    document.getElementById('edit-modal').classList.add('open');
}
function closeEdit() {
    document.getElementById('edit-modal').classList.remove('open');
    editingId = null; editGender = null;
}
function selectEditGender(g) {
    editGender = g;
    document.querySelectorAll('[data-egender]').forEach(b =>
        b.classList.toggle('selected', b.dataset.egender === g));
}
async function saveEdit() {
    if (!editingId) return;
    const length = parseFloat(document.getElementById('edit-length').value);
    const fly    = document.getElementById('edit-fly').value.trim();
    const spot   = document.getElementById('edit-spot').value.trim();
    if (!editGender)          { showToast('Please select a gender'); return; }
    if (!length || length <= 0) { showToast('Please enter a length'); return; }
    if (!fly)                 { showToast('Please enter a fly'); return; }
    if (!spot)                { showToast('Please enter a spot'); return; }
    const { error } = await db.from('catches')
        .update({ gender: editGender, length, fly, spot })
        .eq('id', editingId);
    if (error) { showToast('Error saving changes ✗'); return; }
    const idx = state.catches.findIndex(x => x.id === editingId);
    if (idx !== -1) state.catches[idx] = { ...state.catches[idx], gender: editGender, length, fly, spot };
    renderCatches();
    closeEdit();
    showToast('Catch updated! ✓');
}
